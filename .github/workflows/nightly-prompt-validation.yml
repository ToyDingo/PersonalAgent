name: Nightly Prompt Validation

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  prompt-validation:
    runs-on: ubuntu-latest
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start backend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time."
          exit 1

      - name: Run prompt validation
        working-directory: frontend
        env:
          PROMPT_VALIDATION_API_BASE_URL: http://127.0.0.1:8000
        run: npm run prompt:validate

      - name: Upload prompt validation reports
        uses: actions/upload-artifact@v4
        with:
          name: prompt-validation-reports
          path: |
            frontend/docs/reports/prompt-validation.latest.md
            frontend/docs/reports/prompt-validation.latest.json
